<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>小修の誕生日一番くじ獎卡紀錄</title>
  <style>
    body { font-family: "Noto Sans TC", sans-serif; text-align: center; }
    .login, .main { margin: 20px auto; width: 90%; max-width: 400px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input { margin: 5px; padding: 8px; width: 90%; }
    button { padding: 8px 15px; margin-top: 10px; }
    .item { margin: 10px 0; }
    .grandPrize { margin-top: 20px; font-size: 20px; font-weight: bold; color: green; }
    .colorBox { margin-top: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #eee; }
    .warning { color: red; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="login" id="loginBox">
    <h2>登入</h2>
    <input type="text" id="username" placeholder="帳號(出生西元年)"><br>
    <input type="password" id="password" placeholder="密碼(生日日期四碼)"><br>
    <button onclick="login()">登入</button>
    <div id="loginMsg"></div>
    <div id="storageWarning" class="warning"></div>
  </div>

  <div class="main" id="mainBox" style="display:none;">
    <h2>小修の誕生日一番くじ獎卡紀錄</h2>
    <div id="items"></div>
    <div class="grandPrize" id="grandPrize"></div>
    <div class="colorBox">
      <h3>更改背景顏色</h3>
      <button onclick="changeColor('linear-gradient(to right, #f5f5f5, #cce7ff)')">灰白→淡藍</button>
      <button onclick="changeColor('linear-gradient(to right, #d4f5d4, #ffe0f0)')">淡綠→淡粉</button>
      <button onclick="changeColor('linear-gradient(to right, #fffacd, #cce7ff)')">淡黃→淡藍</button>
      <br><br>
      <h4>自訂漸層顏色</h4>
      <input type="text" id="color1" placeholder="第一個顏色 (如 #ff0000)">
      <input type="text" id="color2" placeholder="第二個顏色 (如 #0000ff)">
      <button onclick="customGradient()">套用自訂漸層</button>

      <!-- 顏色表格 -->
      <table>
        <tr>
          <th>Emoji</th>
          <th>名稱</th>
          <th>色碼</th>
        </tr>
        <tr style="background-color:#ff0000; color:white;">
          <td>🔴</td><td>紅色</td><td>#ff0000</td>
        </tr>
        <tr style="background-color:#ffa500;">
          <td>🟠</td><td>橙色</td><td>#ffa500</td>
        </tr>
        <tr style="background-color:#ffff00;">
          <td>🟡</td><td>黃色</td><td>#ffff00</td>
        </tr>
        <tr style="background-color:#008000; color:white;">
          <td>🟢</td><td>綠色</td><td>#008000</td>
        </tr>
        <tr style="background-color:#0000ff; color:white;">
          <td>🔵</td><td>藍色</td><td>#0000ff</td>
        </tr>
        <tr style="background-color:#800080; color:white;">
          <td>🟣</td><td>紫色</td><td>#800080</td>
        </tr>
        <tr style="background-color:#000000; color:white;">
          <td>⚫</td><td>黑色</td><td>#000000</td>
        </tr>
        <tr style="background-color:#ffffff;">
          <td>⚪</td><td>白色</td><td>#ffffff</td>
        </tr>
        <tr style="background-color:#ffc0cb;">
          <td>🌸</td><td>粉紅</td><td>#ffc0cb</td>
        </tr>
        <tr style="background-color:#87cefa;">
          <td>🌊</td><td>淡藍</td><td>#87cefa</td>
        </tr>
      </table>
    </div>
    <button onclick="clearRecords()">清空獎項紀錄</button>
    <button onclick="logout()">登出</button>
    <button onclick="clearAll()">清除所有資料</button>
  </div>

  <script>
    const account = { user: "2007", pass: "0704" };
    const prizeNames = ["A","B","C","D-1","D-2","D-3","D-4","D-5","E-1","E-2","E-3","E-4","E-5","E-6","E-7","E-8","E-9","E-10","E-11","E-12"];
    const correctCodes = {
      "A":"~","B":"HA","C":"PP","D-1":"Y","D-2":"~","D-3":"BIR","D-4":"TH","D-5":"DAY",
      "E-1":"~","E-2":"I","E-3":"LO","E-4":"VE","E-5":"Y","E-6":"O","E-7":"U","E-8":"生",
      "E-9":"日","E-10":"快","E-11":"樂","E-12":"!!!!!!"
    };

    function storageAvailable(type) {
      try {
        var storage = window[type], x = '__storage_test__';
        storage.setItem(x, x);
        storage.removeItem(x);
        return true;
      } catch(e) { return false; }
    }

    function login() {
      let u = document.getElementById("username").value.trim();
      let p = document.getElementById("password").value.trim();
      if (u === account.user && p === account.pass) {
        localStorage.setItem("loggedIn","true");
        document.getElementById("loginBox").style.display="none";
        document.getElementById("mainBox").style.display="block";
        loadItems();
      } else {
        document.getElementById("loginMsg").textContent="帳號或密碼錯誤！請確認輸入正確";
      }
    }

    window.onload = function() {
      if (!storageAvailable('localStorage')) {
        document.getElementById("storageWarning").textContent = "⚠️ 你的瀏覽器不支援或限制 localStorage，登入功能可能無法使用。請換用 Chrome、Safari 或 Edge。";
      }
      applySavedColor();
      if (localStorage.getItem("loggedIn")==="true") {
        document.getElementById("loginBox").style.display="none";
        document.getElementById("mainBox").style.display="block";
        loadItems();
      }
    };

    function clearRecords() {
      prizeNames.forEach(name=>localStorage.removeItem("code_"+name));
      loadItems();
      document.getElementById("grandPrize").textContent="";
    }

    function logout() {
      localStorage.removeItem("loggedIn");
      location.reload();
    }

    function clearAll() {
      localStorage.clear();
      location.reload();
    }

    function loadItems() {
      const itemsDiv=document.getElementById("items");
      itemsDiv.innerHTML="";
      prizeNames.forEach((name,index)=>{
        const savedCode=localStorage.getItem("code_"+name)||"";
        itemsDiv.innerHTML+=`
          <div class="item">
            ${name} 獎項: 
            <input type="text" id="code
